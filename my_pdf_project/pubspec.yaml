name: my_pdf
description: "PDF reading progress tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  supabase_flutter: ^2.8.4
  firebase_crashlytics: ^4.3.5

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF
  flutter_pdfview: ^1.3.2
  pdfx: ^2.9.0

  # TTS
  flutter_tts: ^4.2.0

  # PDF text extraction (for TTS)
  flutter_pdf_text: ^0.9.0

  # Functional
  dartz: ^0.10.1

  # Network + file system
  http: ^1.2.2
  path_provider: ^2.1.4

  # File & image picking
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Fonts
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  marionette_flutter: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  marionette_mcp: ^0.5.0

flutter:
  uses-material-design: true
