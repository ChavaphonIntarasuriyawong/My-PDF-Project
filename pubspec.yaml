name: my_pdf
description: "PDF reading progress tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  supabase_flutter: ^2.8.4
  firebase_crashlytics: ^4.3.5
  firebase_remote_config: ^5.4.0

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF
  flutter_pdfview: ^1.3.2
  pdfx: ^2.9.0
  syncfusion_flutter_pdf: ^27.1.48

  # TTS
  flutter_tts: ^4.2.0

  # PDF text extraction (for TTS)
  flutter_pdf_text: ^0.9.0

  # Functional
  dartz: ^0.10.1

  # Network + file system
  http: ^1.2.2
  path_provider: ^2.1.4

  # File picking
  file_picker: ^8.1.2

  # Icons
  font_awesome_flutter: ^10.8.0

  # Fun: confetti bursts (book finish + streak milestone).
  confetti: ^0.7.0

  # OCR (mobile only — fallback for scanned PDFs)
  tesseract_ocr: ^0.5.0

  # Modern web interop (replaces dart:html for Tesseract.js bridge)
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tessdata_config.json
    - assets/tessdata/
