# CD workflow for MyPDF web -> Firebase Hosting
#
# Builds the Flutter web release and deploys it. Two paths:
#   - push to main      -> live channel (production URL)
#   - pull_request main -> auto-expiring preview channel (URL posted as
#                          PR comment by FirebaseExtended/action-hosting-deploy)
#
# Required GitHub repository secret (Settings -> Secrets and variables ->
# Actions -> New repository secret):
#   FIREBASE_SERVICE_ACCOUNT
#     Service account JSON for Firebase project `readtrack-8262c`.
#     Obtain via Firebase Console -> Project Settings -> Service Accounts ->
#     Generate new private key. Paste entire JSON contents as the secret value.
#
# Flutter pinned to 3.38.7 (matches local + CI).
#
# Note: web/ocr/ Tesseract.js binaries are NOT committed (.gitkeep only).
# The deployed build will run, but OCR will silent-fail on prod web until
# those binaries are added (see web/ocr/README.md). Tracked as an open R1.

name: CD - Web (Firebase Hosting)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# action-hosting-deploy needs to post a check run + PR comment with the
# preview URL, so GITHUB_TOKEN must be granted those scopes explicitly
# (repo default is read-only on this org).
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  deploy-web:
    name: Build + Deploy Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use PR head SHA on PRs (skip merge commit). Pushes fall back to
          # github.sha. Keeps build inputs identical to what's on the branch.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release

      - name: Deploy to Firebase Hosting (live)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: readtrack-8262c
          channelId: live

      - name: Deploy to Firebase Hosting (PR preview)
        if: github.event_name == 'pull_request'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: readtrack-8262c
          expires: 7d
