# CI workflow for MyPDF
#
# Runs on every push (any branch) and on PRs targeting `main`. Single gating
# job that enforces the three D1 deliverable gates: formatting, static
# analysis, and test suite. Coverage is uploaded as an artifact.
#
# Smoke builds (Android APK, web release) are deliberately omitted from CI:
#   - The web build is exercised end-to-end by the CD workflow.
#   - The Android toolchain has flaked on hosted runners and is not part of
#     the D1 deliverable.
# Add them later if needed; keep CI lean.
#
# Flutter pinned to 3.38.7 (matches local; Dart SDK ^3.10.7 in pubspec.yaml).

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  flutter-ci:
    name: Flutter format + analyze + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lcov-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
